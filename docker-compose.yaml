services:
  kasia-indexer:
    image: kkluster/kasia-indexer:ios-first
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      NETWORK_TYPE: ${NETWORK_TYPE:-mainnet}
      KASIA_INDEXER_DB_ROOT: /data
      KASPA_NODE_WBORSH_URL: ${KASPA_NODE_WBORSH_URL:-}
      INDEXER_PRUNING_DEPTH: ${INDEXER_PRUNING_DEPTH:-3000000}

      # iOS-first push profile (APNs primary, FCM optional/off)
      PUSH_PROVIDER: ${PUSH_PROVIDER:-apns}
      PUSH_IOS_ENABLED: ${PUSH_IOS_ENABLED:-true}
      PUSH_FCM_ENABLED: ${PUSH_FCM_ENABLED:-false}
      PUSH_APNS_ENVIRONMENT: ${PUSH_APNS_ENVIRONMENT:-auto}
      PUSH_APNS_TEAM_ID: ${PUSH_APNS_TEAM_ID:-}
      PUSH_APNS_KEY_ID: ${PUSH_APNS_KEY_ID:-}
      PUSH_APNS_BUNDLE_ID: ${PUSH_APNS_BUNDLE_ID:-com.kbeam.app}
      PUSH_APNS_KEY_PATH: ${PUSH_APNS_KEY_PATH:-/app/secrets/apns/AuthKey.p8}
      PUSH_INLINE_PAYLOAD_LIMIT: ${PUSH_INLINE_PAYLOAD_LIMIT:-3500}
      PUSH_APNS_TIMEOUT_MS: ${PUSH_APNS_TIMEOUT_MS:-15000}
      PUSH_APNS_PRESENCE_ENABLED: ${PUSH_APNS_PRESENCE_ENABLED:-true}
      PUSH_FCM_PROJECT_ID: ${PUSH_FCM_PROJECT_ID:-}
      PUSH_FCM_SERVICE_ACCOUNT_PATH: ${PUSH_FCM_SERVICE_ACCOUNT_PATH:-/app/secrets/fcm/service-account.json}
      PUSH_FCM_TIMEOUT_MS: ${PUSH_FCM_TIMEOUT_MS:-15000}

      GIFT_ENABLED: ${GIFT_ENABLED:-true}
      GIFT_AMOUNT_SOMPI: ${GIFT_AMOUNT_SOMPI:-10000000}
      GIFT_CLAIMS_PATH: ${GIFT_CLAIMS_PATH:-/data/mainnet/gift-claims.json}
      GIFT_CHALLENGE_TTL_MS: ${GIFT_CHALLENGE_TTL_MS:-120000}
      GIFT_CHALLENGE_SKEW_MS: ${GIFT_CHALLENGE_SKEW_MS:-15000}
      GIFT_IP_RATE_LIMIT_COUNT: ${GIFT_IP_RATE_LIMIT_COUNT:-3}
      GIFT_IP_RATE_LIMIT_WINDOW_MS: ${GIFT_IP_RATE_LIMIT_WINDOW_MS:-86400000}
      GIFT_REQUIRE_APPATTEST: ${GIFT_REQUIRE_APPATTEST:-true}
      GIFT_APPATTEST_ENVIRONMENT: ${GIFT_APPATTEST_ENVIRONMENT:-auto}
      GIFT_APPATTEST_TEAM_ID: ${GIFT_APPATTEST_TEAM_ID:-}
      GIFT_APPATTEST_BUNDLE_ID: ${GIFT_APPATTEST_BUNDLE_ID:-com.kbeam.app}
      GIFT_REQUIRE_DEVICECHECK: ${GIFT_REQUIRE_DEVICECHECK:-true}
      GIFT_ALLOW_SIMULATOR_CLAIMS: ${GIFT_ALLOW_SIMULATOR_CLAIMS:-false}
      GIFT_DEVICECHECK_ENVIRONMENT: ${GIFT_DEVICECHECK_ENVIRONMENT:-auto}
      GIFT_DEVICECHECK_TEAM_ID: ${GIFT_DEVICECHECK_TEAM_ID:-}
      GIFT_DEVICECHECK_KEY_ID: ${GIFT_DEVICECHECK_KEY_ID:-}
      GIFT_DEVICECHECK_KEY_PATH: ${GIFT_DEVICECHECK_KEY_PATH:-/app/secrets/devicecheck/AuthKey.p8}
      GIFT_DEVICECHECK_TIMEOUT_MS: ${GIFT_DEVICECHECK_TIMEOUT_MS:-10000}
      GIFT_DEVICECHECK_DEBUG_SECRET: ${GIFT_DEVICECHECK_DEBUG_SECRET:-}
      GIFT_PAYOUT_COMMAND: ${GIFT_PAYOUT_COMMAND:-}
      GIFT_PAYOUT_TIMEOUT_MS: ${GIFT_PAYOUT_TIMEOUT_MS:-30000}
      RUST_BACKTRACE: 1
    ports:
      - ${INDEXER_PORT:-8080}:8080
    volumes:
      - indexer-data:/data
      - ./secrets/apns:/app/secrets/apns:ro
      - ./secrets/fcm:/app/secrets/fcm:ro
      - ./secrets/devicecheck:/app/secrets/devicecheck:ro
      - ./secrets/ssh:/app/secrets/ssh:ro
      - ./secrets/gift:/app/secrets/gift:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/metrics >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  indexer-data:
